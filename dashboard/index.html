<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainGuard — DeFi Security Monitor</title>
    <meta name="description" content="Real-time DeFi risk sentinel. Monitors Uniswap V3/V4, detects malicious contracts with AI, publishes on-chain alerts via Chainlink CRE." />
    <link rel="icon" type="image/png" href="/img/logo-chainguard.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var t = localStorage.getItem('cg-theme');
        var light = t === 'light';
        document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
        document.documentElement.style.background = light ? '#f4f4f8' : '#08080f';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
